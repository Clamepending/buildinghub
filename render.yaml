services:
  - type: web
    name: buildinghub
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build && npm run site
    startCommand: node server/buildinghub-server.mjs
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    disk:
      name: buildinghub-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BUILDINGHUB_DATA_DIR
        value: /var/data/buildinghub
